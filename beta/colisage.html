<body style="margin:0;background:#14171c">
<!--
  COLISAGE — TV dashboard (Kortenberg DC) — planbord-editie
  ============================================================
  Leest zijn data uit de planbord-database (Supabase), rij id="cijfers",
  veld doc.colisage. Zelfde teamlogin als het planbord: log op dit toestel
  één keer in op de beta (zelfde browser), daarna werkt deze pagina vanzelf.

  DATA — wat de Power Automate-flow in doc.colisage moet zetten (JSON):
  {
    "updated": "2026-06-09T14:32:00",
    "tours": [
      { "tour":"TOUR 113", "open":44, "xdock":12, "groen":28,
        "sectorMP":9, "sectorH":4, "banden":28,
        "stuks": [   // optioneel: detail "laatste stukken" (max DETAIL_MAX)
          { "nr":"1K0 615 301 T", "oms":"Remschijf voor", "loc":"H0122A2",
            "lp":"0010000000045874152", "aantal":2 }
        ] }
      // enkel tours met werk volstaan; rest = 0
      // "stuks" enkel zinvol voor toeren die bijna klaar zijn (<= DETAIL_DREMPEL).
      // Veldnamen mogen ook: item i.p.v. nr, naam i.p.v. oms, qty i.p.v. aantal.
    ]
  }
  Zolang er geen doc.colisage in de database staat: DEMO-modus.

  SCHERMKEUZE: via de ⚙-knop rechtsboven (keuze wordt per TV onthouden),
  of via URL ?scherm=sdd / ?gangen=0,9 (wordt dan ook onthouden).

  FOCUS (brigadier): via de 🎯-knop toeren kiezen die dicht moeten (of preset
  🌙 Avondsluiting). Keuze staat in database-rij id="coli_focus" en geldt voor
  ALLE schermen (elk scherm toont enkel zijn eigen focus-toeren), vervalt bij
  dagwissel. Focus-scherm = gesplitst per tour met alle stukken + totalen groot.
  Flow-tip: stuur voor focus-toeren altijd de stuks mee.
  Sluituren per toer (in het \ud83c\udfaf-menu): focus gaat automatisch aan vanaf
  FOCUS_VOORLOOP_MIN minuten voor het sluituur; sluituren blijven dag na dag staan.

  VERSIE: badge in de header = COLI_VERSION; de pagina checkt elke 5 min
  colisage-version.txt en herlaadt zichzelf bij een nieuwe versie.
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=JetBrains+Mono:wght@700;800&display=swap');
  :root{
    --steel-900:#14171c; --steel-850:#181d24; --steel-800:#1b2027; --steel-700:#262d36;
    --line:#2f3742; --seam:#0c0e12; --amber:#ffb23e; --amber-soft:#ffc977; --amber-dim:#5a4624;
    --text:#e8eaed; --muted:#7c8794; --live:#46d17f; --warn:#f0883e; --down:#e5534b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  #stage{
    position:fixed;inset:0;
    background: radial-gradient(130% 70% at 50% -5%, rgba(255,178,62,.08), transparent 55%), var(--steel-900);
    color:var(--text); font-family:'Oswald',sans-serif;
    display:flex;flex-direction:column;overflow:hidden; -webkit-font-smoothing:antialiased;
  }
  .header{display:flex;align-items:center;justify-content:space-between;
    padding:clamp(12px,1.6vw,24px) clamp(18px,2.6vw,40px); border-bottom:1px solid var(--line);}
  .brand{font-size:clamp(16px,2vw,30px);letter-spacing:.34em;text-transform:uppercase;font-weight:600;}
  .brand b{color:var(--amber);font-weight:700;}
  .status{display:flex;align-items:center;gap:.7em;font-size:clamp(12px,1.4vw,20px);
    letter-spacing:.28em;text-transform:uppercase;color:var(--muted);}
  .dot{width:.7em;height:.7em;border-radius:50%;background:var(--live);color:var(--live);
    box-shadow:0 0 0 0 currentColor;animation:pulse 2.4s infinite;}
  .status[data-state="down"] .dot{background:var(--down);color:var(--down);}
  .status[data-state="demo"] .dot{background:var(--warn);color:var(--warn);}
  @keyframes pulse{0%{box-shadow:0 0 0 0 currentColor;}70%{box-shadow:0 0 0 .9em rgba(0,0,0,0);}100%{box-shadow:0 0 0 0 rgba(0,0,0,0);}}
  .state-label{min-width:7em;color:var(--text);}
  .kpis{display:flex;gap:clamp(8px,1vw,16px);padding:clamp(12px,1.6vw,24px) clamp(18px,2.6vw,40px);}
  .kpi{flex:1;position:relative;
    background:linear-gradient(180deg,var(--steel-700),var(--steel-800) 49%,var(--steel-700) 51%,var(--steel-800));
    border-radius:clamp(6px,.6vw,12px); padding:clamp(10px,1.3vw,22px) clamp(10px,1.4vw,24px);
    box-shadow:inset 0 2px 5px rgba(0,0,0,.45),0 5px 18px rgba(0,0,0,.35); overflow:hidden;}
  .kpi::after{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:var(--seam);}
  .kpi .num{font-family:'JetBrains Mono',monospace;font-weight:800;color:var(--amber);
    font-size:clamp(40px,6.2vw,108px);line-height:.95;text-shadow:0 0 16px rgba(255,178,62,.22);}
  .kpi .cap{font-size:clamp(11px,1.25vw,19px);letter-spacing:.2em;text-transform:uppercase;
    color:var(--muted);margin-top:.5em;font-weight:500;}
  .panel{flex:1;display:flex;flex-direction:column;min-height:0; margin:0 clamp(18px,2.6vw,40px);
    border:1px solid var(--line);border-radius:clamp(6px,.6vw,12px); background:var(--steel-850);overflow:hidden;}
  .thead,.row{display:grid;grid-template-columns:2.2fr .8fr .9fr .9fr .8fr .7fr 1fr; align-items:center;}
  .thead{padding:clamp(8px,1vw,16px) clamp(14px,1.6vw,26px); border-bottom:1px solid var(--line);color:var(--muted);
    font-size:clamp(11px,1.2vw,18px);letter-spacing:.16em;text-transform:uppercase;font-weight:500;}
  .thead span:not(:first-child),.row .c:not(:first-child){text-align:right;justify-self:end;}
  .tbody{flex:1;min-height:0;overflow:hidden;}
  .row{position:relative;padding:clamp(6px,.85vw,14px) clamp(14px,1.6vw,26px);
    border-bottom:1px solid rgba(47,55,66,.55);font-size:clamp(15px,1.9vw,30px);}
  .row:last-child{border-bottom:none;}
  .row .tour{font-weight:500;letter-spacing:.04em;}
  .row .c{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--text);}
  .row .c.zero{color:#41484f;}
  .row .total{color:var(--amber);}
  .row .bar{position:absolute;left:0;top:0;bottom:0;background:rgba(255,178,62,.07);
    border-left:2px solid rgba(255,178,62,.35);z-index:0;}
  .row > *{position:relative;z-index:1;}
  .srow{display:grid;grid-template-columns:2.2fr 3.2fr 1.9fr .7fr;align-items:center;
    padding:clamp(3px,.5vw,9px) clamp(14px,1.6vw,26px);
    border-bottom:1px solid rgba(47,55,66,.35);font-size:clamp(12px,1.35vw,21px);
    background:rgba(255,178,62,.035);}
  .srow .nr{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--amber-soft);letter-spacing:.05em;padding-left:1.2em;}
  .srow .oms{color:var(--muted);letter-spacing:.06em;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .srow .oms b{color:var(--text);font-weight:500;}
  .srow .lp{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.85em;color:var(--muted);text-align:right;justify-self:end;letter-spacing:.03em;}
  .srow .qty{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--text);text-align:right;justify-self:end;}
  .empty{flex:1;height:100%;display:flex;align-items:center;justify-content:center;
    font-size:clamp(22px,3vw,46px);letter-spacing:.2em;text-transform:uppercase;color:var(--live);}
  .footer{display:flex;align-items:center;gap:clamp(14px,2vw,30px);
    padding:clamp(8px,1.1vw,18px) 0 clamp(8px,1.1vw,18px) clamp(18px,2.6vw,40px);
    margin-top:clamp(10px,1.4vw,20px); border-top:1px solid var(--line);background:var(--steel-850);}
  .footer .tag{flex:none;font-size:clamp(12px,1.4vw,22px);letter-spacing:.22em;
    text-transform:uppercase;color:var(--steel-900);background:var(--amber);
    padding:.45em .9em;border-radius:4px;font-weight:600;}
  .footer .banden-total{flex:none;font-family:'JetBrains Mono',monospace;font-weight:800;
    color:var(--amber);font-size:clamp(20px,2.6vw,42px);line-height:1;
    text-shadow:0 0 14px rgba(255,178,62,.2);}
  .ticker{flex:1;overflow:hidden;white-space:nowrap;mask-image:linear-gradient(90deg,transparent,#000 4%,#000 96%,transparent);}
  .ticker-track{display:inline-block;animation:marquee linear infinite;}
  .ticker-track .half{display:inline-block;}
  .ticker .it{font-size:clamp(14px,1.7vw,26px);letter-spacing:.12em;text-transform:uppercase;
    color:var(--text);padding:0 1.4em;}
  .ticker .it b{color:var(--amber-soft);font-family:'JetBrains Mono',monospace;font-weight:800;}
  .ticker .sep{color:var(--amber-dim);}
  @keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  .pageind{font-size:clamp(11px,1.2vw,18px);letter-spacing:.2em;color:var(--muted);
    padding:clamp(6px,.8vw,12px) clamp(18px,2.6vw,40px);text-align:right; text-transform:uppercase;}
  #kiesBtn,#focusBtn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:6px;
    font:inherit;font-size:.9em;padding:.2em .55em;cursor:pointer;letter-spacing:0;}
  #kiesBtn:hover,#focusBtn:hover{color:var(--amber);border-color:var(--amber-dim);}
  #kies{position:fixed;inset:0;background:rgba(10,12,16,.82);display:flex;align-items:center;justify-content:center;z-index:50;}
  #kies .box{background:var(--steel-850);border:1px solid var(--line);border-radius:12px;
    padding:clamp(18px,2.4vw,36px);display:flex;flex-direction:column;gap:.7em;min-width:min(90vw,420px);}
  #kies h2{font-size:clamp(14px,1.6vw,24px);letter-spacing:.24em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:.3em;}
  #kies button{font-family:inherit;font-size:clamp(15px,1.8vw,26px);letter-spacing:.12em;text-transform:uppercase;
    background:var(--steel-700);color:var(--text);border:1px solid var(--line);border-radius:8px;
    padding:.45em .9em;cursor:pointer;text-align:left;}
  #kies button:hover{border-color:var(--amber);}
  #kies button.act{border-color:var(--amber);color:var(--amber);}
  .fwrap{height:100%;display:grid;grid-auto-flow:column;grid-auto-columns:1fr;}
  .fpan{display:flex;flex-direction:column;min-height:0;border-right:1px solid var(--line);}
  .fpan:last-child{border-right:none;}
  .fhead{padding:clamp(10px,1.3vw,20px) clamp(14px,1.6vw,26px);border-bottom:1px solid var(--line);}
  .fhead .ft{font-size:clamp(16px,1.9vw,30px);letter-spacing:.12em;text-transform:uppercase;font-weight:600;}
  .fhead .badge{background:var(--amber);color:var(--steel-900);border-radius:4px;padding:.1em .45em;font-size:.7em;letter-spacing:.2em;vertical-align:middle;margin-right:.5em;font-weight:700;}
  .fhead .fn{font-family:'JetBrains Mono',monospace;font-weight:800;color:var(--amber);font-size:clamp(34px,4.6vw,84px);line-height:1;text-shadow:0 0 16px rgba(255,178,62,.22);margin-top:.15em;}
  .fhead .fsub{color:var(--muted);font-size:clamp(11px,1.2vw,18px);letter-spacing:.14em;text-transform:uppercase;margin-top:.4em;}
  .fstuks{flex:1;min-height:0;overflow:hidden;}
  .fstuks .srow{font-size:clamp(16px,2vw,32px);padding:clamp(6px,.8vw,13px) clamp(14px,1.6vw,26px);}
  .fstuks .srow .lp{font-size:.72em;}
  .fmeer{padding:.6em clamp(14px,1.6vw,26px);color:var(--muted);font-size:clamp(12px,1.3vw,20px);letter-spacing:.14em;text-transform:uppercase;}
  #ver{font-size:.72em;color:var(--muted);letter-spacing:.1em;}
  @media (prefers-reduced-motion: reduce){ .dot{animation:none;}.ticker-track{animation:none;} }
</style>
<div id="stage">
  <div class="header">
    <div class="brand" style="display:flex;align-items:center;gap:.9em">
      <a href="./" title="Terug naar het planbord" style="color:var(--muted);text-decoration:none;font-size:.55em;letter-spacing:.18em;border:1px solid var(--line);border-radius:6px;padding:.4em .8em;font-weight:500">&#8592; PLANBORD</a>
      <span><b>Colisage</b> &middot; Kortenberg</span>
    </div>
    <div class="status" id="status" data-state="live">
      <span class="dot"></span>
      <span class="state-label" id="stateLabel">Live</span>
      <span id="clock">--:--:--</span>
      <span id="ver"></span>
      <button id="focusBtn" title="Focus-toeren (brigadier)">&#127919;</button>
      <button id="kiesBtn" title="Schermkeuze (per TV onthouden)">&#9881;</button>
    </div>
  </div>
  <div class="kpis" id="kpis"></div>
  <div class="panel">
    <div class="thead">
      <span>Tour</span><span>Open</span><span>Cross dock</span><span>Groene bakken</span><span>M+P</span><span>H&amp;L</span><span>Totaal</span>
    </div>
    <div class="tbody" id="tbody"></div>
  </div>
  <div class="pageind" id="pageind"></div>
  <div class="footer">
    <span class="tag">Banden</span>
    <span class="banden-total" id="bandenTotal">0</span>
    <div class="ticker"><div class="ticker-track" id="track"></div></div>
  </div>
</div>
<script>
  // ===================== INSTELLINGEN =====================
  const CONFIG = {
    SB_URL: "https://gntaanclvusvhfkgjusz.supabase.co",
    SB_KEY: "sb_publishable_bZ6yeDauQb1md0bIOwCoJQ_KbQAc4qV",
    POLL_SECONDS: 30,      // verversfrequentie
    PAGE_SECONDS: 8,       // hoe lang elke pagina tours blijft staan
    DETAIL_DREMPEL: 10,    // stukdetail zodra tour-totaal <= dit aantal (0 = uit)
    DETAIL_MAX: 10,        // max detailregels per tour
    FOCUS_VOORLOOP_MIN: 60 // met sluituur: focus start zoveel minuten vooraf
  };
  const COLI_VERSION = "c3";
  // ========================================================
  const TOURS = [
    "TOUR 110","TOUR 111","TOUR 112","TOUR 113","TOUR 114","TOUR 115","TOUR 116","TOUR 117","TOUR 118","TOUR 119",
    "TOUR 230","TOUR 231","TOUR 232","TOUR 233","TOUR 234","TOUR 235","TOUR 236","TOUR 237","TOUR 238",
    "TOUR 320","TOUR 321","TOUR 322","TOUR 323","TOUR 324","TOUR 325","TOUR 326","TOUR 327",
    "TOUR 400","TOUR 510","TOUR 511","TOUR 512","TOUR 530","TOUR 531","TOUR 550","TOUR 551",
    "TOUR 570","TOUR 571","TOUR 590","TOUR 591","TOUR 600","TOUR 601","TOUR 620","TOUR 621",
    "TOUR 640","TOUR 641","TOUR 660","TOUR 661","TOUR 680","TOUR 681",
    "TOUR 700","TOUR 710","TOUR 720","TOUR 730","TOUR 740","TOUR 750","TOUR 760","TOUR 770","TOUR 780",
    "Pick Up","CVI","Carglass DEP","Hekla DEP","TOUR 990 (STOCK)","Tour Lokeren","Tour Coox 01039",
    "Carglass Stock","Issue Load (Info Dieter)","Hekla STO","CAT"
  ];
  const KPI_DEFS = [
    {key:"open",     cap:"Open orders"},
    {key:"xdock",    cap:"Cross dock NEW+NC"},
    {key:"groen",    cap:"Groene bakken"},
    {key:"sectorMP", cap:"Sector M+P"},
    {key:"sectorH",  cap:"Sector H & L"}
  ];
  const WORK_KEYS = ["open","xdock","groen","sectorMP","sectorH"];
  /* ---- schermkeuze via URL: ?scherm=sdd  of  ?gangen=1,2 (plan toeren CLIPS 2020) ---- */
  const QS = new URLSearchParams(location.search);
  let SCHERM_SDD = (QS.get("scherm")||"").toLowerCase()==="sdd";
  let GANGEN_SEL = (QS.get("gangen")||"").split(",").map(x=>parseInt(x,10)).filter(n=>!isNaN(n));
  /* keuze per TV onthouden: URL wint en wordt bewaard; zonder URL geldt de bewaarde keuze */
  try{
    if(QS.has("scherm")||QS.has("gangen")){
      localStorage.setItem("coli_kies", JSON.stringify({sdd:SCHERM_SDD, gangen:GANGEN_SEL}));
    } else {
      const k=JSON.parse(localStorage.getItem("coli_kies")||"null");
      if(k){ SCHERM_SDD=!!k.sdd; GANGEN_SEL=Array.isArray(k.gangen)?k.gangen:[]; }
    }
  }catch(e){}
  const GANG_TOURS = {0:[600,601,700],1:[510,511,512,710],2:[620,621,720],3:[530,531,730],4:[640,641,740],
                      5:[550,551,750],6:[660,661,760],7:[570,571,770],8:[680,681,780],9:[590,591]};
  const FOCUS_PRESET = ["TOUR 510","TOUR 511","TOUR 512","TOUR 530","TOUR 531","TOUR 550","TOUR 551","TOUR 570","TOUR 571","TOUR 590","TOUR 591"];
  let focusTours = [];
  let focusSluit = {};   // {"TOUR 510":"18:00", ...} -> automatische focus vanaf voorloop
  const SCHERM_PAREN = [[0,9],[1,2],[3,4],[5,6],[7,8]];
  function tourNum(name){ const m=(""+name).match(/\d{3}/); return m?+m[0]:null; }
  function isSDD(name){ const n=tourNum(name); return n!==null && ((n>=110&&n<=119)||(n>=230&&n<=238)||(n>=320&&n<=327)); }
  function inGangen(name){ const n=tourNum(name); if(n===null) return false; return GANGEN_SEL.some(g=>(GANG_TOURS[g]||[]).indexOf(n)>=0); }
  /* banden-ticker: enkel de sluit-toeren (510-780) */
  function bandenToer(t){ const n=tourNum(t.tour); return n!==null && n>=500 && n<=799; }
  function schermFilter(tours){
    if(SCHERM_SDD) return tours.filter(t=>isSDD(t.tour));
    if(GANGEN_SEL.length) return tours.filter(t=>inGangen(t.tour));
    return tours;
  }
  (function(){
    try{
      let lbl=null;
      if(SCHERM_SDD) lbl="SDD";
      else if(GANGEN_SEL.length) lbl="Gang "+GANGEN_SEL.join(" + ");
      if(lbl){
        document.title="Colisage \u00b7 "+lbl+" \u2014 TV";
        const b=document.querySelector(".brand span");
        if(b) b.innerHTML="<b>Colisage</b> &middot; "+lbl;
      }
    }catch(e){}
  })();
  let state = { tours: [], banden: 0 };
  let page = 0, rowsPerPage = 10, failures = 0;
  let demoBase = null;
  const kpisEl   = document.getElementById('kpis');
  const tbodyEl  = document.getElementById('tbody');
  const trackEl  = document.getElementById('track');
  const bandenTotalEl = document.getElementById('bandenTotal');
  const pageEl   = document.getElementById('pageind');
  const statusEl = document.getElementById('status');
  const stateLbl = document.getElementById('stateLabel');
  const clockEl  = document.getElementById('clock');
  const kpiNums = {};
  KPI_DEFS.forEach(d=>{
    const el = document.createElement('div'); el.className='kpi';
    el.innerHTML = `<div class="num" data-k="${d.key}">0</div><div class="cap">${d.cap}</div>`;
    kpisEl.appendChild(el);
    kpiNums[d.key] = el.querySelector('.num');
  });
  function rowTotal(t){ return WORK_KEYS.reduce((s,k)=>s+(t[k]||0),0); }
  function normalize(tours){
    return tours.map(t=>({
      tour:t.tour, open:+t.open||0, xdock:+t.xdock||0, groen:+t.groen||0,
      sectorMP:+t.sectorMP||0, sectorH:+t.sectorH||0, banden:+t.banden||0,
      stuks: Array.isArray(t.stuks) ? t.stuks.slice(0,CONFIG.DETAIL_MAX).map(s=>({
        nr:(""+(s.nr||s.item||"?")).trim(),
        oms:(""+(s.oms||s.naam||"")).trim(),
        loc:(""+(s.loc||"")).trim(),
        lp:(""+(s.lp||s.licenseplate||s.plate||"")).trim(),
        aantal:+s.aantal||+s.qty||1
      })) : []
    }));
  }
  function countUp(el, to){
    const from = +el.dataset.val || 0;
    if(from===to){ el.textContent=to; return; }
    el.dataset.val = to;
    const start = performance.now(), dur=700;
    function step(now){
      const p = Math.min(1,(now-start)/dur);
      el.textContent = Math.round(from + (to-from)*(1-Math.pow(1-p,3)));
      if(p<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }
  function setStatus(s,l){ statusEl.dataset.state=s; stateLbl.textContent=l; }
  function measureRows(){
    const h = tbodyEl.clientHeight;
    const sample = 0.0185*window.innerHeight + 28;
    rowsPerPage = Math.max(1, Math.floor(h / sample));
  }
  function activeTours(){
    return state.tours.filter(t=>rowTotal(t)>0).sort((a,b)=>rowTotal(b)-rowTotal(a));
  }
  function renderKpis(){
    const agg = {open:0,xdock:0,groen:0,sectorMP:0,sectorH:0};
    state.tours.forEach(t=>WORK_KEYS.forEach(k=>agg[k]+=t[k]||0));
    KPI_DEFS.forEach(d=>countUp(kpiNums[d.key], agg[d.key]));
  }
  function detailFor(t){
    if(!CONFIG.DETAIL_DREMPEL || !t.stuks || !t.stuks.length) return [];
    if(rowTotal(t) > CONFIG.DETAIL_DREMPEL) return [];
    return t.stuks.slice(0, CONFIG.DETAIL_MAX);
  }
  function buildPages(){
    const rows = activeTours();
    const groups = rows.map(t=>{
      const g=[{tp:"tour",t:t}];
      detailFor(t).forEach(s=>g.push({tp:"stuk",s:s}));
      return g;
    });
    const pages=[]; let cur=[];
    groups.forEach(g=>{
      if(cur.length && cur.length+g.length>rowsPerPage){ pages.push(cur); cur=[]; }
      cur=cur.concat(g);
    });
    if(cur.length) pages.push(cur);
    return {rows:rows, pages:pages};
  }
  function effectieveFocus(){
    const set = {}; focusTours.forEach(n=>{ set[n]=1; });
    const nu = new Date(); const nuMin = nu.getHours()*60+nu.getMinutes();
    Object.keys(focusSluit||{}).forEach(n=>{
      const m = /^(\d{1,2}):(\d{2})$/.exec(focusSluit[n]||"");
      if(m){ const t=(+m[1])*60+(+m[2]); if(nuMin >= t-CONFIG.FOCUS_VOORLOOP_MIN && nuMin <= t+180) set[n]=1; }
    });
    return Object.keys(set);
  }
  function focusOpScherm(){
    return schermFilter(effectieveFocus().map(n=>({tour:n}))).map(t=>t.tour);
  }
  function renderFocus(fo){
    pageEl.textContent = "FOCUS actief";
    const cols = fo.slice(0,3).map(name=>{
      const t = state.tours.find(x=>x.tour===name) || {tour:name,open:0,xdock:0,groen:0,sectorMP:0,sectorH:0,stuks:[]};
      const tot = rowTotal(t);
      const st = t.stuks||[];
      const MAXR = 12;
      const rows = st.slice(0,MAXR).map(s=>`<div class="srow"><span class="nr">${s.nr}</span><span class="oms">${s.oms}${s.loc?' · <b>'+s.loc+'</b>':''}</span><span class="lp">${s.lp||""}</span><span class="qty">${s.aantal}×</span></div>`).join("");
      const meer = st.length>MAXR ? `<div class="fmeer">+ ${st.length-MAXR} meer…</div>` : "";
      const leeg = (!st.length) ? `<div class="fmeer">${tot>0?"geen stukdetail beschikbaar":"alles gescand ✓"}</div>` : "";
      return `<div class="fpan"><div class="fhead">`+
        `<div class="ft"><span class="badge">FOCUS</span>${t.tour}</div>`+
        `<div class="fn">${tot}</div>`+
        `<div class="fsub">open ${t.open} · cross dock ${t.xdock} · groene bakken ${t.groen} · M+P ${t.sectorMP} · H&L ${t.sectorH}</div>`+
        `</div><div class="fstuks">${rows}${meer}${leeg}</div></div>`;
    }).join("");
    tbodyEl.innerHTML = `<div class="fwrap">${cols}</div>`;
  }
  function renderTable(){
    const fo = focusOpScherm();
    const th = document.querySelector(".thead");
    if(fo.length){ kpisEl.style.display="none"; th.style.display="none"; renderFocus(fo); return; }
    kpisEl.style.display=""; th.style.display="";
    const b = buildPages();
    if(b.rows.length===0){
      tbodyEl.innerHTML = '<div class="empty">Alles gescand ✓</div>';
      pageEl.textContent = "";
      return;
    }
    const maxT = rowTotal(b.rows[0]) || 1;
    if(page>=b.pages.length) page=0;
    tbodyEl.innerHTML = b.pages[page].map(L=>{
      if(L.tp==="stuk"){
        const s=L.s;
        return `<div class="srow"><span class="nr">${s.nr}</span><span class="oms">${s.oms}${s.loc?' · <b>'+s.loc+'</b>':''}</span><span class="lp">${s.lp||""}</span><span class="qty">${s.aantal}×</span></div>`;
      }
      const t=L.t, tot=rowTotal(t);
      const cell=(v)=>`<span class="c${v?'':' zero'}">${v}</span>`;
      return `<div class="row">
        <span class="bar" style="width:${(tot/maxT*100).toFixed(1)}%"></span>
        <span class="tour">${t.tour}</span>
        ${cell(t.open)}${cell(t.xdock)}${cell(t.groen)}${cell(t.sectorMP)}${cell(t.sectorH)}
        <span class="c total">${tot}</span>
      </div>`;
    }).join("");
    pageEl.textContent = b.pages.length>1 ? `Pagina ${page+1} / ${b.pages.length}` : "";
  }
  function renderTicker(){
    bandenTotalEl.textContent = state.banden;
    const rows = state.tours.filter(t=>bandenToer(t)&&t.banden>0).sort((a,b)=>b.banden-a.banden);
    const items = rows.map(t=>`<span class="it">${t.tour} <b>${t.banden}</b></span><span class="sep">◆</span>`);
    if(items.length===0) items.push(`<span class="it">geen banden te scannen</span>`);
    const half = `<span class="half">${items.join("")}</span>`;
    trackEl.innerHTML = half + half;
    const chars = trackEl.textContent.length || 1;
    trackEl.style.animationDuration = Math.max(25, chars*0.22) + "s";
  }
  function update(payload){
    state.tours = schermFilter(normalize(payload.tours||[]));
    state.banden = state.tours.filter(bandenToer).reduce((s,t)=>s+t.banden,0);
    renderKpis(); renderTable(); renderTicker();
  }
  const DEMO_STUKS = [
    {nr:"1K0 615 301 T",  oms:"Remschijf voor",    loc:"H0122A2", lp:"0010000000045874152"},
    {nr:"04E 115 561 H",  oms:"Oliefilter",        loc:"M0110A2", lp:"0010000000045874201"},
    {nr:"5Q0 407 271 B",  oms:"Aandrijfas links",  loc:"P0233B1", lp:"0010000000045873966"},
    {nr:"3V0 807 217 A",  oms:"Bumpersteun voor",  loc:"L0112A2", lp:"0010000000045874390"},
    {nr:"57A 955 425",    oms:"Wisserblad achter", loc:"M1025D1", lp:"0010000000045874077"},
    {nr:"2Q0 698 151 AB", oms:"Remblokkenset",     loc:"X0611A1", lp:"0010000000045874523"}
  ];
  function demoData(){
    if(!demoBase){
      demoBase = {};
      TOURS.forEach(name=>{
        if(Math.random()<0.9){
          demoBase[name] = {
            open:1+Math.floor(Math.random()*55),
            xdock:Math.floor(Math.random()*18),
            groen:Math.floor(Math.random()*35),
            sectorMP:Math.floor(Math.random()*14),
            sectorH:Math.floor(Math.random()*10),
            banden:Math.floor(Math.random()*30)
          };
        }
      });
      /* per gang + SDD een paar bijna-klare toeren, zodat het stukdetail op elk scherm te zien is */
      const bijnaKlaar=["TOUR 110","TOUR 234","TOUR 323"];
      Object.keys(GANG_TOURS).forEach(g=>{ bijnaKlaar.push("TOUR "+GANG_TOURS[g][0]); });
      bijnaKlaar.forEach(name=>{
        const v = demoBase[name] || (demoBase[name]={open:0,xdock:0,groen:0,sectorMP:0,sectorH:0,banden:Math.floor(Math.random()*8)});
        WORK_KEYS.forEach(k=>{ v[k]=Math.min(v[k]||0,2); });
        if(WORK_KEYS.every(k=>!v[k])) v.open=2;
      });
    }
    const tours = [];
    Object.entries(demoBase).forEach(([name,v])=>{
      WORK_KEYS.concat("banden").forEach(k=>{
        v[k] = Math.max(0, v[k] + Math.round((Math.random()-0.55)*4));
      });
      const t=Object.assign({tour:name}, v);
      const tot=WORK_KEYS.reduce((s,k)=>s+t[k],0);
      if(tot>0 && tot<=CONFIG.DETAIL_DREMPEL){
        t.stuks = DEMO_STUKS.slice(0, Math.min(tot,6)).map((s,i)=>Object.assign({aantal:1+(i%3)}, s));
      }
      tours.push(t);
    });
    /* focus-toeren krijgen in demo een volledige stukkenlijst */
    effectieveFocus().forEach(name=>{
      let t = tours.find(x=>x.tour===name);
      if(!t){ t={tour:name,open:0,xdock:0,groen:0,sectorMP:0,sectorH:0,banden:0}; tours.push(t); }
      if(rowTotal(t)===0) t.open = 4;
      const n = Math.min(Math.max(rowTotal(t),4), CONFIG.DETAIL_MAX);
      t.stuks = [];
      for(let i=0;i<n;i++){ t.stuks.push(Object.assign({aantal:1+(i%3)}, DEMO_STUKS[i%DEMO_STUKS.length])); }
    });
    return {tours};
  }
  /* ---- focus (brigadier): gedeeld via database-rij coli_focus, vervalt bij dagwissel ---- */
  function vandaag(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  function leesFocus(doc){
    try{
      focusSluit = (doc && doc.sluit) ? doc.sluit : {};
      focusTours = (doc && Array.isArray(doc.tours) && doc.dag===vandaag()) ? doc.tours : [];
    }catch(e){ focusTours=[]; focusSluit={}; }
  }
  function leesFocusLokaal(){
    try{ const k=JSON.parse(localStorage.getItem("coli_focus_demo")||"null");
      focusSluit = (k && k.sluit) ? k.sluit : {};
      focusTours = (k && k.dag===vandaag() && Array.isArray(k.tours)) ? k.tours : [];
    }catch(e){ focusTours=[]; focusSluit={}; }
  }
  async function zetFocus(tours, sluit){
    focusTours = tours; if(sluit) focusSluit = sluit;
    const t = tok();
    if(!t){
      try{ localStorage.setItem("coli_focus_demo", JSON.stringify({tours:tours,sluit:focusSluit,dag:vandaag()})); }catch(e){}
      poll(); return;
    }
    const doc = {tours:tours, sluit:focusSluit, dag:vandaag(), updated:new Date().toISOString()};
    const H = {apikey:CONFIG.SB_KEY, Authorization:"Bearer "+t, "Content-Type":"application/json"};
    try{
      let r = await fetch(CONFIG.SB_URL+"/rest/v1/planbord?on_conflict=id",
        {method:"POST", headers:Object.assign({Prefer:"resolution=merge-duplicates"},H),
         body:JSON.stringify([{id:"coli_focus", doc:doc}])});
      if(!r.ok){
        r = await fetch(CONFIG.SB_URL+"/rest/v1/planbord?id=eq.coli_focus",
          {method:"PATCH", headers:H, body:JSON.stringify({doc:doc})});
      }
      if(!r.ok) alert("Focus opslaan mislukt ("+r.status+") - geen schrijfrechten?");
    }catch(e){ alert("Focus opslaan mislukt: "+e); }
    poll();
  }
  /* ---- planbord-database (zelfde teamlogin als de beta) ---- */
  function tok(){
    try{ const s=JSON.parse(localStorage.getItem("vp_sb_sess")||"null"); return (s&&s.t)?s.t:null; }
    catch(e){ return null; }
  }
  async function poll(){
    const t = tok();
    if(!t){ leesFocusLokaal(); setStatus("demo","Demo · log in op de beta"); update(demoData()); return; }
    try{
      const res = await fetch(CONFIG.SB_URL+"/rest/v1/planbord?id=in.(cijfers,coli_focus)&select=id,doc",
        {headers:{apikey:CONFIG.SB_KEY,Authorization:"Bearer "+t},cache:"no-store"});
      if(!res.ok) throw new Error(res.status);
      const a = await res.json();
      const rij = {}; (a||[]).forEach(r=>{ rij[r.id]=r.doc; });
      leesFocus(rij["coli_focus"]);
      const d = rij["cijfers"] ? rij["cijfers"].colisage : null;
      if(d && Array.isArray(d.tours)){
        failures=0;
        let lbl="Live";
        try{
          if(d.updated){
            const m=Math.round((Date.now()-Date.parse(d.updated))/60000);
            if(m>30){ setStatus("down","Data "+m+" min oud"); update(d); return; }
            lbl="Live · "+(m<1?"zonet":m+" min");
          }
        }catch(e){}
        setStatus("live",lbl); update(d);
      } else {
        setStatus("demo","Demo · wacht op data"); update(demoData());
      }
    }catch(e){
      failures++; setStatus("down", failures>2 ? "Verbinding kwijt" : "Hapering");
    }
  }
  /* ---- schermkeuze-menu ---- */
  const KIES_OPTS = [
    {lbl:"Alles",      v:null},
    {lbl:"SDD",        v:{sdd:true, gangen:[]}},
    {lbl:"Gang 0 + 9", v:{sdd:false, gangen:[0,9]}},
    {lbl:"Gang 1 + 2", v:{sdd:false, gangen:[1,2]}},
    {lbl:"Gang 3 + 4", v:{sdd:false, gangen:[3,4]}},
    {lbl:"Gang 5 + 6", v:{sdd:false, gangen:[5,6]}},
    {lbl:"Gang 7 + 8", v:{sdd:false, gangen:[7,8]}}
  ];
  function kiesActueel(o){
    if(!o.v) return !SCHERM_SDD && GANGEN_SEL.length===0;
    if(o.v.sdd) return SCHERM_SDD;
    return !SCHERM_SDD && GANGEN_SEL.join(",")===o.v.gangen.join(",");
  }
  function openKies(){
    const old=document.getElementById("kies"); if(old){ old.remove(); return; }
    const w=document.createElement("div"); w.id="kies";
    const box=document.createElement("div"); box.className="box";
    const h=document.createElement("h2"); h.textContent="Welk scherm is dit?"; box.appendChild(h);
    KIES_OPTS.forEach(o=>{
      const b=document.createElement("button");
      b.textContent=o.lbl+(kiesActueel(o)?" \u2713":"");
      if(kiesActueel(o)) b.className="act";
      b.addEventListener("click",function(){
        try{
          if(o.v) localStorage.setItem("coli_kies", JSON.stringify(o.v));
          else localStorage.removeItem("coli_kies");
        }catch(e){}
        location.href=location.pathname;
      });
      box.appendChild(b);
    });
    w.appendChild(box);
    w.addEventListener("click",function(ev){ if(ev.target===w) w.remove(); });
    document.getElementById("stage").appendChild(w);
  }
  document.getElementById("kiesBtn").addEventListener("click", openKies);
  /* ---- focus-kiezer (brigadier) ---- */
  function openFocus(){
    const old=document.getElementById("kies"); if(old){ old.remove(); return; }
    const w=document.createElement("div"); w.id="kies";
    const box=document.createElement("div"); box.className="box"; box.style.maxWidth="min(94vw,760px)";
    const h=document.createElement("h2"); h.textContent="Focus-toeren (sluiten)"; box.appendChild(h);
    const sel = {}; focusTours.forEach(n=>{ sel[n]=true; });
    const uren = Object.assign({}, focusSluit||{});
    const lijst=document.createElement("div");
    lijst.style.cssText="max-height:60vh;overflow:auto;display:flex;flex-direction:column;gap:.35em;";
    SCHERM_PAREN.forEach(p=>{
      const kop=document.createElement("div");
      kop.textContent="Gang "+p[0]+" + "+p[1];
      kop.style.cssText="color:var(--muted);letter-spacing:.2em;text-transform:uppercase;font-size:clamp(11px,1.1vw,16px);margin-top:.5em;";
      lijst.appendChild(kop);
      const rijen=document.createElement("div");
      rijen.style.cssText="display:flex;flex-wrap:wrap;gap:.45em;";
      GANG_TOURS[p[0]].concat(GANG_TOURS[p[1]]).forEach(nr=>{
        const name="TOUR "+nr;
        const cel=document.createElement("div");
        cel.style.cssText="display:flex;align-items:center;gap:.3em;";
        const b=document.createElement("button");
        b.textContent=nr;
        b.style.cssText="font-size:clamp(13px,1.3vw,20px);padding:.3em .55em;";
        function paint(){ b.classList.toggle("act", !!sel[name]); }
        paint();
        b.addEventListener("click",function(){ sel[name]=!sel[name]; paint(); });
        const u=document.createElement("input");
        u.type="time"; u.value=uren[name]||"";
        u.style.cssText="background:var(--steel-700);color:var(--text);border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:clamp(11px,1.1vw,16px);padding:.2em .3em;color-scheme:dark;";
        u.addEventListener("change",function(){ if(u.value) uren[name]=u.value; else delete uren[name]; });
        cel.appendChild(b); cel.appendChild(u);
        rijen.appendChild(cel);
      });
      lijst.appendChild(rijen);
    });
    box.appendChild(lijst);
    const uitleg=document.createElement("div");
    uitleg.textContent="Sluituur ingesteld? Focus gaat voor die toer automatisch aan vanaf "+CONFIG.FOCUS_VOORLOOP_MIN+" min vooraf.";
    uitleg.style.cssText="color:var(--muted);font-size:clamp(11px,1.1vw,16px);margin-top:.5em;";
    box.appendChild(uitleg);
    const rij=document.createElement("div");
    rij.style.cssText="display:flex;gap:.6em;flex-wrap:wrap;margin-top:.5em;";
    function knop(lbl,fn){ const b=document.createElement("button"); b.textContent=lbl; b.addEventListener("click",fn); rij.appendChild(b); }
    knop("\ud83c\udf19 Avondsluiting nu",function(){ zetFocus(FOCUS_PRESET.slice(), uren); w.remove(); });
    knop("\u2714 Bewaar",function(){ zetFocus(Object.keys(sel).filter(n=>sel[n]), uren); w.remove(); });
    knop("\u2716 Focus uit",function(){ zetFocus([], uren); w.remove(); });
    box.appendChild(rij);
    w.appendChild(box);
    w.addEventListener("click",function(ev){ if(ev.target===w) w.remove(); });
    document.getElementById("stage").appendChild(w);
  }
  document.getElementById("focusBtn").addEventListener("click", openFocus);
  /* ---- versie-watcher: TV herlaadt zichzelf bij nieuwe versie ---- */
  document.getElementById("ver").textContent = COLI_VERSION;
  async function checkVersie(){
    try{
      const r = await fetch("colisage-version.txt?cb="+Date.now(), {cache:"no-store"});
      if(r.ok){
        const v = (await r.text()).trim();
        if(v && v!==COLI_VERSION) location.reload();
      }
    }catch(e){}
  }
  setInterval(checkVersie, 5*60*1000);
  function nextPage(){ page++; renderTable(); }
  function tickClock(){ clockEl.textContent = new Date().toLocaleTimeString('nl-BE',{hour12:false}); }
  window.addEventListener('resize', ()=>{ measureRows(); renderTable(); });
  measureRows();
  tickClock(); poll();
  setInterval(tickClock, 1000);
  setInterval(poll, CONFIG.POLL_SECONDS*1000);
  setInterval(nextPage, CONFIG.PAGE_SECONDS*1000);
</script>
</body>
</html>
